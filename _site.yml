name: "mauricio-camargo.github.io"
output_dir: "."
exclude: ["README.md"]
output:
  html_document:
    theme: cosmo
    highlight: default
    code_folding: hide
    number_sections: false
    toc: true
    toc_depth: 4
    toc_float:
      collapsed: false
      smooth_scroll: false
    includes:
      in_header: analytics.html
      after_body: footer.html
navbar:
  title: "Maurício Camargo"
  icon: fa-home
  type: inverse
  left:
    - text: "Home"
      icon: fa-home
      href: index.html    
    - text: "Ensino"
      icon: fa fa-book
      href: ensino.html
    - text: "Pesquisa"
      icon: fa fa-flask
      href: pesquisa.html
    - text: "Extensão"
      icon: fa fa-user
      href: extensao.html
    - text: "Administração"
      icon: fa fa-newspaper-o
      href: administracao.html
    - text: "Software"
      icon: fa fa-linux
      href: software.html
    - text: "R-ecados"
      icon: fa fa-cog
      href: r-ecados.html
    - text: "Agenda"
      icon: fa fa-calendar
      href: agenda.html
  right:
    - text: GitHub
      icon: fa-github fa-lg
      href: https://github.com/mauricio-camargo
