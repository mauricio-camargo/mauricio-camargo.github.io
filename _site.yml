name: "mauricio-camargo.github.io"
output_dir: "."
exclude: ["README.md"]
output:
  html_document:
    theme: flatly
    highlight: default
    code_folding: hide
    number_sections: false
    toc: true
    toc_depth: 4
    toc_float:
      collapsed: false
      smooth_scroll: false
    includes:
      in_header: analytics.html
      after_body: footer.html
navbar:
  title: "Maurício Camargo"
  left:
    - text: "Ensino"
      href: ensino.html
    - text: "Pesquisa"
      href: pesquisa.html
    - text: "Extensão"
      href: extensao.html
    - text: "Administração"
      href: administracao.html
    - text: "Software"
      href: software.html
    - text: "R-ecados"
      href: r-ecados.html
  right:
    - text: GitHub
      icon: fa-github fa-lg
      href: https://github.com/mauricio-camargo
